                Cómo añadir un libro nuevo:
                1. Copia un bloque <figure class="gallery-item">...</figure> completo.
                2. Cambia el texto del alt y el título/autor/año en el figcaption.
                3. Reemplaza portadas/placeholder.svg por la ruta de tu imagen (ej. portadas/el-principito.jpg).
                4. Clases opcionales en .book-frame: "favorite" (marco dorado) y "priority" (marco verde, solo en Lista de deseos).
                Cuando existan subpáginas por libro, envuelve el .book-frame en <a href="libro-slug.html">.
